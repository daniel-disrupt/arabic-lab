<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Arabic Lab</title>
<meta name="description" content="A language-learning tool built around real spoken Palestinian Arabic — video, synced reading text, vocab and verbs, in Hebrew and English.">
<meta property="og:title" content="Arabic Lab">
<meta property="og:description" content="A language-learning tool built around real spoken Palestinian Arabic — video, synced reading text, vocab and verbs, in Hebrew and English.">
<meta property="og:type" content="website">
<meta property="og:url" content="https://daniel-disrupt.github.io/arabic-lab/">
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root { --black: #0D0D0D; --mid: #8A8A8A; --rule: #E4E3E0; --active-bg: #F0EFE9; }
  html, body { min-height: 100%; background: #fff; color: var(--black); font-family: -apple-system, 'Segoe UI', system-ui, sans-serif; }
  .lib-wrap { max-width: 720px; margin: 0 auto; padding: 48px 24px 64px; }
  .lib-header { margin-bottom: 40px; }
  .lib-title { font-size: 22px; font-weight: 700; letter-spacing: -.01em; }
  .lib-subtitle { font-size: 14px; color: var(--mid); margin-top: 6px; }
  .lib-list { display: flex; flex-direction: column; gap: 14px; }
  .lib-card { display: block; border: 1px solid var(--rule); border-radius: 10px; padding: 18px 20px; text-decoration: none; color: inherit; transition: background .12s, border-color .12s; }
  .lib-card:hover { background: var(--active-bg); border-color: var(--black); }
  .lib-card-title { font-size: 16px; font-weight: 600; }
  .lib-card-subtitle { font-size: 13px; color: var(--mid); margin-top: 4px; }
  .lib-empty { font-size: 14px; color: var(--mid); }
</style>
</head>
<body>

<div class="lib-wrap">
  <div class="lib-header">
    <div class="lib-title">Arabic Lab</div>
    <div class="lib-subtitle">Real spoken Palestinian Arabic, turned into study material — pick a lesson.</div>
  </div>
  <div class="lib-list" id="lib-list"></div>
  <div class="lib-empty" id="lib-empty" style="display:none">No lessons published yet.</div>
</div>

<script>
fetch('lessons/manifest.json')
  .then(r => r.json())
  .then(lessons => {
    const list = document.getElementById('lib-list');
    if (!lessons.length) { document.getElementById('lib-empty').style.display = 'block'; return; }
    list.innerHTML = lessons.map(l => `
      <a class="lib-card" href="lesson.html?slug=${encodeURIComponent(l.slug)}">
        <div class="lib-card-title">${l.title}</div>
        <div class="lib-card-subtitle">${l.subtitle || ''}</div>
      </a>
    `).join('');
  })
  .catch(err => {
    console.error('Failed to load lesson manifest', err);
    document.getElementById('lib-empty').textContent = 'Could not load lessons.';
    document.getElementById('lib-empty').style.display = 'block';
  });
</script>
</body>
</html>
